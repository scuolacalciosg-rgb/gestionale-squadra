<!DOCTYPE html>
<html lang="it" class="h-full bg-[#141212]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASD San Giovanni — Gestionale v2</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        @theme {
            --color-brand: #CC1F1F;
            --color-brand-hover: #A81818;
            --font-sans: 'DM Sans', system-ui, sans-serif;
        }
        /* Override stili per compatibilità con il motore dell'app */
        .badge-win { background-color: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge-draw { background-color: rgba(245, 158, 11, 0.15); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
        .badge-loss { background-color: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body class="h-full text-zinc-200 font-sans antialiased selection:bg-red-600 selection:text-white overflow-hidden">

    <div id="loading-screen" class="fixed inset-0 bg-[#0f0d0d] flex flex-col items-center justify-center z-50 gap-4">
        <div class="w-16 h-16 bg-brand rounded-full flex items-center justify-center shadow-lg shadow-red-950/50">
            <i class="ti ti-shield-half text-white text-3xl"></i>
        </div>
        <p class="text-sm font-medium text-zinc-500 tracking-wide uppercase">Caricamento in corso...</p>
        <div class="w-6 h-6 border-3 border-zinc-800 border-t-brand rounded-full animate-spin"></div>
    </div>

    <div class="flex h-full w-full overflow-hidden">
        <aside class="w-60 bg-[#0f0d0d] border-r border-zinc-900 flex flex-col justify-between shrink-0 z-10">
            <div>
                <div class="flex items-center gap-3 px-4 py-5 border-b border-zinc-900/80 mb-4">
                    <div class="w-10 h-10 bg-brand rounded-full flex items-center justify-center shadow-md shadow-red-950/40 shrink-0">
                        <i class="ti ti-shield-half text-white text-xl"></i>
                    </div>
                    <div class="min-w-0">
                        <h2 class="text-sm font-bold text-white truncate uppercase tracking-wider">ASD San Giovanni</h2>
                        <div class="flex items-center gap-1.5 mt-0.5">
                            <span class="text-[11px] text-zinc-500 font-medium">2025/26</span>
                            <span id="sync-dot" class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                        </div>
                    </div>
                </div>

                <nav class="space-y-0.5 px-2" id="main-nav">
                    <button onclick="window.switchTab('dashboard')" id="nav-dashboard" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-zinc-400 hover:text-white hover:bg-zinc-900/60 transition-all duration-150 active">
                        <i class="ti ti-layout-dashboard text-lg"></i> Dashboard
                    </button>
                    <button onclick="window.switchTab('players')" id="nav-players" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-zinc-400 hover:text-white hover:bg-zinc-900/60 transition-all duration-150">
                        <i class="ti ti-users text-lg"></i> Rosa
                    </button>
                    <button onclick="window.switchTab('matches')" id="nav-matches" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-zinc-400 hover:text-white hover:bg-zinc-900/60 transition-all duration-150">
                        <i class="ti ti-device-gamepad-2 text-lg"></i> Partite
                    </button>
                    <button onclick="window.switchTab('calendar')" id="nav-calendar" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-zinc-400 hover:text-white hover:bg-zinc-900/60 transition-all duration-150">
                        <i class="ti ti-calendar text-lg"></i> Calendario
                    </button>
                    <button onclick="window.switchTab('tournaments')" id="nav-tournaments" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-zinc-400 hover:text-white hover:bg-zinc-900/60 transition-all duration-150">
                        <i class="ti ti-trophy text-lg"></i> Tornei
                    </button>
                    <button onclick="window.switchTab('trainings')" id="nav-trainings" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-zinc-400 hover:text-white hover:bg-zinc-900/60 transition-all duration-150">
                        <i class="ti ti-barbell text-lg"></i> Allenamenti
                    </button>
                    <button onclick="window.switchTab('attendance')" id="nav-attendance" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-zinc-400 hover:text-white hover:bg-zinc-900/60 transition-all duration-150">
                        <i class="ti ti-clipboard-check text-lg"></i> Presenze
                    </button>
                    <button onclick="window.switchTab('finances')" id="nav-finances" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-zinc-400 hover:text-white hover:bg-zinc-900/60 transition-all duration-150">
                        <i class="ti ti-wallet text-lg"></i> Finanze
                    </button>
                    <button onclick="window.switchTab('comms')" id="nav-comms" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-zinc-400 hover:text-white hover:bg-zinc-900/60 transition-all duration-150">
                        <i class="ti ti-speakerphone text-lg"></i> Comunicazioni
                    </button>
                    <button onclick="window.switchTab('gallery')" id="nav-gallery" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-zinc-400 hover:text-white hover:bg-zinc-900/60 transition-all duration-150">
                        <i class="ti ti-photo text-lg"></i> Galleria
                    </button>
                    <button onclick="window.switchTab('stats')" id="nav-stats" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-zinc-400 hover:text-white hover:bg-zinc-900/60 transition-all duration-150">
                        <i class="ti ti-chart-bar text-lg"></i> Statistiche
                    </button>
                    <button onclick="window.switchTab('goals')" id="nav-goals" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-zinc-400 hover:text-white hover:bg-zinc-900/60 transition-all duration-150">
                        <i class="ti ti-target-arrow text-lg"></i> Obiettivi
                    </button>
                    <button onclick="window.switchTab('ai')" id="nav-ai" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-zinc-400 hover:text-white hover:bg-zinc-900/60 transition-all duration-150">
                        <i class="ti ti-robot text-lg"></i> Assistente IA
                    </button>
                </nav>
            </div>

            <div class="p-3 border-t border-zinc-900/80 space-y-1 bg-[#0b0a0a]">
                <button onclick="window.switchTab('settings')" id="nav-settings" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-zinc-500 hover:text-white hover:bg-zinc-900/60 transition-all duration-150">
                    <i class="ti ti-settings text-lg"></i> Impostazioni
                </button>
                <div class="px-3 pt-1 text-[10px] text-zinc-600 font-medium tracking-wider uppercase">
                    ASD San Giovanni &copy; 2026
                </div>
            </div>
        </aside>

        <main class="flex-1 bg-[#161414] relative overflow-y-auto flex flex-col justify-between" 
              style="background-image: linear-gradient(to bottom, rgba(20, 18, 18, 0.97) 0%, rgba(20, 18, 18, 0.90) 40%, rgba(20, 18, 18, 0.65) 100%), url('image_ca1d49.jpg'); background-size: cover; background-position: center bottom;">
            
            <div id="tab-content" class="p-6 w-full max-w-7xl mx-auto space-y-6">
                </div>

            <div class="p-6 mt-auto w-full max-w-7xl mx-auto opacity-40">
                <p class="text-xs text-zinc-500 text-center">Sistema di Gestione Sportiva Avanzata</p>
            </div>
        </main>
    </div>

    <style>
        /* Classi attive per la navigazione laterale */
        .nav-item.active {
            background-color: rgba(204, 31, 31, 0.15) !important;
            color: #ff6b6b !important;
            font-weight: 600;
            border-left: 3px solid #CC1F1F;
            border-radius: 0 8px 8px 0;
        }

        /* Adattamento dei moduli dinamici originali al look & feel scuro ad alto contrasto */
        #tab-content h1, #tab-content h2, #tab-content h3 { color: #ffffff !important; font-weight: 800 !important; tracking: -0.025em; }
        #tab-content p { color: #a1a1aa !important; }
        
        /* Griglie KPI e Card dell'app originale */
        .kpi-card, [style*="background: var(--surface)"], [style*="background:var(--surface)"] {
            background-color: rgba(24, 22, 22, 0.92) !important;
            border: 1px solid rgba(63, 63, 70, 0.4) !important;
            border-radius: 12px !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5) !important;
            backdrop-filter: blur(8px);
            color: #f4f4f5 !important;
        }
        
        /* Input, Selezioni e Pulsanti nei moduli dell'app originale */
        input, select, textarea {
            background-color: #0f0d0d !important;
            border: 1px solid #27272a !important;
            color: #ffffff !important;
            border-radius: 8px !important;
            padding: 6px 10px !important;
        }
        input:focus, select:focus {
            border-color: #CC1F1F !important;
            outline: none;
        }
        
        /* Bottoni primari nei moduli */
        button[style*="background: var(--green)"], button[style*="background:var(--green)"], .btn-primary {
            background: #CC1F1F !important;
            color: white !important;
            font-weight: 600 !important;
            border-radius: 8px !important;
            transition: background 0.2s;
        }
        button[style*="background: var(--green)"]:hover {
            background: #A81818 !important;
        }
    </style>

    <script>
    // Configurazione di base dell'applicazione originale
    const APP_VERSION = "2.1.0";
    let currentTab = 'dashboard';
    
    // Inizializzazione dati nel LocalStorage se vuoto
    if(!localStorage.getItem('asdsg_players')) localStorage.setItem('asdsg_players', JSON.stringify([]));
    if(!localStorage.getItem('asdsg_matches')) localStorage.setItem('asdsg_matches', JSON.stringify([]));
    if(!localStorage.getItem('asdsg_trainings')) localStorage.setItem('asdsg_trainings', JSON.stringify([]));
    if(!localStorage.getItem('asdsg_finances')) localStorage.setItem('asdsg_finances', JSON.stringify([]));
    if(!localStorage.getItem('asdsg_comms')) localStorage.setItem('asdsg_comms', JSON.stringify([]));
    if(!localStorage.getItem('asdsg_gallery')) localStorage.setItem('asdsg_gallery', JSON.stringify([]));
    if(!localStorage.getItem('asdsg_goals')) localStorage.setItem('asdsg_goals', JSON.stringify([]));
    if(!localStorage.getItem('asdsg_tournaments')) localStorage.setItem('asdsg_tournaments', JSON.stringify([]));

    // Funzione originale per caricare i dati
    function getData(key) { return JSON.parse(localStorage.getItem('asdsg_' + key)) || []; }
    function saveData(key, data) { localStorage.setItem('asdsg_' + key, JSON.stringify(data)); updateDashboard(); }

    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            const loader = document.getElementById('loading-screen');
            if(loader) loader.style.display = 'none';
        }, 600);
        window.switchTab('dashboard');
        checkOnlineStatus();
    });

    window.addEventListener('online', checkOnlineStatus);
    window.addEventListener('offline', checkOnlineStatus);

    function checkOnlineStatus() {
        const dot = document.getElementById('sync-dot');
        if(!dot) return;
        if(navigator.onLine) {
            dot.className = "w-2 h-2 rounded-full bg-emerald-500 animate-pulse";
        } else {
            dot.className = "w-2 h-2 rounded-full bg-amber-500";
        }
    }

    window.switchTab = (tabId) => {
        currentTab = tabId;
        document.querySelectorAll('#main-nav .nav-item, #nav-settings').forEach(el => el.classList.remove('active'));
        const activeNav = document.getElementById('nav-' + tabId);
        if(activeNav) activeNav.classList.add('active');
        
        const content = document.getElementById('tab-content');
        if(!content) return;
        
        if(tabId === 'dashboard') renderDashboard(content);
        else if(tabId === 'players') renderPlayers(content);
        else if(tabId === 'matches') renderMatches(content);
        else if(tabId === 'calendar') renderCalendar(content);
        else if(tabId === 'tournaments') renderTournaments(content);
        else if(tabId === 'trainings') renderTrainings(content);
        else if(tabId === 'attendance') renderAttendance(content);
        else if(tabId === 'finances') renderFinances(content);
        else if(tabId === 'comms') renderComms(content);
        else if(tabId === 'gallery') renderGallery(content);
        else if(tabId === 'stats') renderStats(content);
        else if(tabId === 'goals') renderGoals(content);
        else if(tabId === 'ai') renderAI(content);
        else if(tabId === 'settings') renderSettings(content);
    };

    function updateDashboard() {
        if(currentTab === 'dashboard') window.switchTab('dashboard');
    }

    // --- SEZIONE DASHBOARD ---
    function renderDashboard(container) {
        const players = getData('players');
        const matches = getData('matches');
        const trainings = getData('trainings');
        
        let nextTraining = '—';
        const now = new Date().getTime();
        const futureTrainings = trainings.filter(t => new Date(t.data).getTime() > now).sort((a,b) => new Date(a.data)-new Date(b.data));
        if(futureTrainings.length > 0) {
            const d = new Date(futureTrainings[0].data);
            nextTraining = d.toLocaleDateString('it-IT', {day:'numeric', month:'short'}) + (futureTrainings[0].ora ? ' ' + futureTrainings[0].ora : '');
        }

        const wins = matches.filter(m => m.esito === 'V').length;

        const dOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const dateStr = new Date().toLocaleDateString('it-IT', dOptions);

        let lastMatchHtml = `<div style="text-align:center;padding:20px;color:var(--text3)">Nessuna partita registrata.</div>`;
        if(matches.length > 0) {
            const last = matches[matches.length - 1];
            let badgeClass = last.esito === 'V' ? 'badge-win' : (last.esito === 'P' ? 'badge-loss' : 'badge-draw');
            lastMatchHtml = `
                <div style="display:flex;align-items:center;justify-content:between;background:rgba(15,13,13,0.4);padding:16px;border-radius:8px;border:1px solid rgba(255,255,255,0.05)">
                    <div>
                        <div style="font-weight:600;font-size:15px">Noi vs ${last.avversario}</div>
                        <div style="font-size:12px;color:var(--text3);margin-top:2px">${new Date(last.data).toLocaleDateString('it-IT')} · ${last.tipo || 'Campionato'}</div>
                        ${last.marcatori ? `<div style="font-size:12px;color:var(--green);font-style:italic;margin-top:4px">Gol: ${last.marcatori}</div>` : ''}
                    </div>
                    <div style="display:flex;align-items:center;gap:12px">
                        <span style="font-size:18px;font-weight:700;font-family:'DM Mono'">${last.golFatto} - ${last.golSubito}</span>
                        <span class="${badgeClass}" style="padding:4px 8px;border-radius:6px;font-size:12px;font-weight:600">${last.esito || '?'}</span>
                    </div>
                </div>
            `;
        }

        let comms = getData('comms');
        let commsHtml = comms.length === 0 ? 
            `<div style="text-align:center;padding:20px;color:var(--text3)">Nessuna comunicazione recente.</div>` :
            comms.slice(-2).reverse().map(c => `
                <div style="background:rgba(15,13,13,0.4);padding:12px;border-radius:8px;margin-bottom:8px;border:1px solid rgba(255,255,255,0.05)">
                    <div style="font-weight:500;font-size:13px">${c.titolo}</div>
                    <div style="font-size:12px;color:var(--text2);margin-top:4px">${c.testo}</div>
                    <div style="font-size:10px;color:var(--text3);margin-top:6px;text-align:right">${new Date(c.date || new Date()).toLocaleDateString('it-IT')}</div>
                </div>
            `).join('');

        container.innerHTML = `
            <div style="display:flex;justify-content:between;align-items:center;margin-bottom:10px">
                <div>
                    <h1 style="font-size:24px;font-weight:700;margin:0">Dashboard</h1>
                    <div style="font-size:12px;color:var(--text3);margin-top:2px">${dateStr}</div>
                </div>
            </div>

            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px">
                <div class="kpi-card" style="padding:20px">
                    <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px">Giocatori in Rosa</div>
                    <div style="font-size:28px;font-weight:700;color:var(--green);margin-top:4px">${players.length}</div>
                </div>
                <div class="kpi-card" style="padding:20px">
                    <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px">Partite Giocate</div>
                    <div style="font-size:28px;font-weight:700;margin-top:4px">${matches.length}</div>
                </div>
                <div class="kpi-card" style="padding:20px">
                    <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px">Vittorie</div>
                    <div style="font-size:28px;font-weight:700;color:var(--green);margin-top:4px">${wins}</div>
                </div>
                <div class="kpi-card" style="padding:20px">
                    <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px">Prossimo Allenamento</div>
                    <div style="font-size:20px;font-weight:700;color:var(--text2);margin-top:12px">${nextTraining}</div>
                </div>
            </div>

            <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-top:6px">
                <div class="kpi-card" style="padding:20px">
                    <h3 style="font-size:14px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px"><i class="ti ti-history"></i> Ultima Partita</h3>
                    ${lastMatchHtml}
                </div>
                <div class="kpi-card" style="padding:20px">
                    <h3 style="font-size:14px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px"><i class="ti ti-speakerphone"></i> Comunicazioni</h3>
                    ${commsHtml}
                </div>
            </div>

            <div class="kpi-card" style="padding:20px;margin-top:6px">
                <h3 style="font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px"><i class="ti ti-barbell"></i> Prossimi Allenamenti</h3>
                ${futureTrainings.length === 0 ? '<p style="font-size:13px;color:var(--text3)">Nessun allenamento programmato.</p>' : 
                futureTrainings.slice(0,3).map(t => `
                    <div style="display:flex;justify-content:between;align-items:center;padding:10px;border-bottom:1px solid var(--border);font-size:13px">
                        <span style="font-weight:500">${new Date(t.data).toLocaleDateString('it-IT', {weekday:'short', day:'numeric', month:'short'})} alle ${t.ora || '—'}</span>
                        <span style="color:var(--text3)">${t.tipo || 'Standard'}</span>
                    </div>
                `).join('')}
            </div>
        `;
    }

    // --- SEZIONE ROSA (PLAYERS) ---
    function renderPlayers(container) {
        const players = getData('players');
        container.innerHTML = `
            <div style="display:flex;justify-content:between;align-items:center;margin-bottom:20px">
                <h1 style="font-size:22px;font-weight:700">Rosa Giocatori</h1>
                <button onclick="window.showPlayerModal()" style="background:var(--green);color:white;border:none;padding:8px 14px;border-radius:var(--radius);font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px"><i class="ti ti-plus"></i> Nuovo Giocatore</button>
            </div>
            <div class="kpi-card" style="overflow-x:auto">
                <table style="width:100%;border-collapse:collapse;text-align:left;font-size:13px">
                    <thead>
                        <tr style="border-bottom:1px solid var(--border2);color:var(--text2)">
                            <th style="padding:12px">Numero</th>
                            <th style="padding:12px">Nome</th>
                            <th style="padding:12px">Ruolo</th>
                            <th style="padding:12px">Gol</th>
                            <th style="padding:12px">Note</th>
                            <th style="padding:12px;text-align:right">Azioni</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${players.length === 0 ? `<tr><td colspan="6" style="padding:24px;text-align:center;color:var(--text3)">Nessun giocatore inserito.</td></tr>` : 
                        players.map((p, idx) => `
                            <tr style="border-bottom:1px solid var(--border)">
                                <td style="padding:12px;font-family:'DM Mono';font-weight:600;color:var(--green)">#${p.numero || '—'}</td>
                                <td style="padding:12px;font-weight:500">${p.nome}</td>
                                <td style="padding:12px"><span style="background:var(--surface2);padding:2px 6px;border-radius:4px;font-size:11px">${p.ruolo || '—'}</span></td>
                                <td style="padding:12px;font-weight:600">${p.gol || 0}</td>
                                <td style="padding:12px;color:var(--text2);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.note || '—'}</td>
                                <td style="padding:12px;text-align:right">
                                    <button onclick="window.editPlayer(${idx})" style="background:none;border:none;color:var(--blue-dark);cursor:pointer;padding:4px"><i class="ti ti-edit"></i></button>
                                    <button onclick="window.deletePlayer(${idx})" style="background:none;border:none;color:var(--red);cursor:pointer;padding:4px;margin-left:6px"><i class="ti ti-trash"></i></button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    window.showPlayerModal = (idx = null) => {
        const players = getData('players');
        const p = idx !== null ? players[idx] : {nome:'', numero:'', ruolo:'', gol:0, note:''};
        
        const modal = document.createElement('div');
        modal.style = "position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)";
        modal.innerHTML = `
            <div class="kpi-card" style="width:100%;max-width:400px;padding:24px;background:var(--surface)">
                <h3 style="font-size:16px;font-weight:600;margin-bottom:16px">${idx !== null ? 'Modifica' : 'Aggiungi'} Giocatore</h3>
                <div style="display:flex;flex-direction:column;gap:12px">
                    <div>
                        <label style="font-size:12px;color:var(--text2);display:block;margin-bottom:4px">Nome Completo *</label>
                        <input type="text" id="p-nome" value="${p.nome}" style="width:100%">
                    </div>

    function renderCalendar(container) {
        const months = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
        
        // Unione di allenamenti e partite

        const matches = getData('matches').map(m => ({...m, type:'match', label:`Gara vs ${m.avversario}`, color:'#185FA5'}));
        const allEvents = [...trainings, ...matches].sort((a,b) => new Date(a.data) - new Date(b.data));

        // Filtra eventi del mese corrente
        const currentMonthEvents = allEvents.filter(e => {
            const d = new Date(e.data);
            return d.getMonth() === calMonth && d.getFullYear() === calYear;
        });

        container.innerHTML = `
            <div style="display:flex;justify-content:between;align-items:center;margin-bottom:20px">
                <h1 style="font-size:22px;font-weight:700">Calendario Eventi</h1>
                <div style="display:flex;align-items:center;gap:12px">
                    <button onclick="window.calPrev()" style="background:var(--surface2);border:1px solid var(--border);padding:6px 10px;border-radius:6px;cursor:pointer"><i class="ti ti-chevron-left"></i></button>
                    <span style="font-size:16px;font-weight:600;min-width:120px;text-align:center">${months[calMonth]} ${calYear}</span>
                    <button onclick="window.calNext()" style="background:var(--surface2);border:1px solid var(--border);padding:6px 10px;border-radius:6px;cursor:pointer"><i class="ti ti-chevron-right"></i></button>
                </div>
            </div>
            
            <div style="display:grid;grid-template-columns: 1fr;gap:12px">
                ${currentMonthEvents.length === 0 ? `<div class="kpi-card" style="padding:40px;text-align:center;color:var(--text3)">Nessun evento in questo mese.</div>` : 
                currentMonthEvents.map(e => `
                    <div class="kpi-card" style="padding:14px;border-left:4px solid ${e.color};display:flex;align-items:center;justify-content:between;cursor:pointer" onclick="window.calEventClick('${allEvents.indexOf(e)}','${e.type}')">
                        <div>
                            <div style="font-size:15px;font-weight:600">${e.label}</div>
                            <div style="font-size:12px;color:var(--text3);margin-top:2px">
                                <i class="ti ti-clock"></i> ${e.ora || '—'} · <i class="ti ti-calendar"></i> ${new Date(e.data).toLocaleDateString('it-IT')}
                                ${e.luogo ? ' · ' + e.luogo : ''}
                            </div>
                        </div>
                        <i class="ti ti-chevron-right" style="color:var(--text3)"></i>
                    </div>
                `).join('')}
            </div>
        `;
    }

                        <label style="font-size:12px;color:var(--text2);display:block;margin-bottom:4px">Focus Principale</label>
                        <input type="text" id="tr-focus" placeholder="es: Tiri in porta, Resistenza" style="width:100%">
                    </div>
                    <div style="display:flex;justify-content:end;gap:10px;margin-top:10px">
                        <button id="btn-tr-cancel" style="background:var(--surface2);border:1px solid var(--border);padding:8px 14px;border-radius:var(--radius);cursor:pointer;color:var(--text)">Annulla</button>
                        <button id="btn-tr-save" style="background:var(--green);color:white;border:none;padding:8px 14px;border-radius:var(--radius);font-weight:500;cursor:pointer">Conferma</button>
                    </div>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        modal.querySelector('#btn-tr-cancel').onclick = () => modal.remove();
        modal.querySelector('#btn-tr-save').onclick = () => {
            const data = modal.querySelector('#tr-data').value;
            if(!data) return alert('La data è obbligatoria');
            const trainings = getData('trainings');
            trainings.push({
                data,
                ora: modal.querySelector('#tr-ora').value,
                tipo: modal.querySelector('#tr-tipo').value,
                focus: modal.querySelector('#tr-focus').value.trim()
            });
            saveData('trainings', trainings);
            modal.remove();
            window.switchTab('trainings');
        };
    };

    window.deleteTraining = (idx) => {
        if(confirm("Eliminare questa sessione di allenamento?")) {
            const data = getData('trainings');
            data.splice(idx, 1);
            saveData('trainings', data);
            window.switchTab('trainings');
        }
    };
